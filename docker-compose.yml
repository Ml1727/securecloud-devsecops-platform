services:
  postgres:
    image: postgres:16
    container_name: securecloud-postgres
    restart: always
    environment:
      POSTGRES_DB: securecloud
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./app/database/init:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: