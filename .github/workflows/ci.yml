name: SecureCloud CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # Backend
      - name: Install Backend Dependencies
        working-directory: ./app/backend
        run: npm install

      - name: Test Backend
        working-directory: ./app/backend
        run: npm test --if-present

      # Frontend
      - name: Install Frontend Dependencies
        working-directory: ./app/frontend
        run: npm install

      - name: Test Frontend
        working-directory: ./app/frontend
        run: npm test --if-present

      - name: CI Pipeline Completed
        run: echo "SecureCloud CI pipeline completed successfully!"
