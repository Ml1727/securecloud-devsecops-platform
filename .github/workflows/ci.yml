name: SecureCloud CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install app dependencies
        working-directory: ./app
        run: npm install

      - name: Run tests if available
        working-directory: ./app
        run: npm test --if-present

      - name: CI completed
        run: echo "SecureCloud CI pipeline completed successfully"
