apiVersion: apps/v1
kind: Deployment
metadata:
  name: securecloud-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: securecloud-backend
  template:
    metadata:
      labels:
        app: securecloud-backend
    spec:
      containers:
      - name: securecloud-backend
        image: securecloud-backend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        env:
        - name: DB_HOST
          value: postgres-service
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: securecloud
        - name: DB_USER
          value: postgres
        - name: DB_PASSWORD
          value: postgres

---
apiVersion: v1
kind: Service
metadata:
  name: securecloud-backend-service
spec:
  selector:
    app: securecloud-backend
  type: NodePort
  ports:
  - protocol: TCP
    port: 5000
    targetPort: 5000
    nodePort: 30050
